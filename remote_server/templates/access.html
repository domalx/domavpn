<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访问结果</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        .success {
            color: #4CAF50;
        }
        .error {
            color: #f44336;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            margin: 10px 0;
        }
        .link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .back-link {
            display: block;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
        }
        .back-link:hover {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="content"></div>
    </div>
    <script>
        var proxyPort = "{{PROXY_PORT}}";
        var status = "{{STATUS}}";
        var message = "{{MESSAGE}}";

        if (status === "success") {
            var redirectUrl = "http://localhost:" + proxyPort + "/";
            document.getElementById("content").innerHTML =
                "<h1 class=\"success\">✅ 验证成功!</h1>" +
                "<p>正在跳转到内网服务...</p>" +
                "<p>代理端口: " + proxyPort + "</p>" +
                "<a href=\"" + redirectUrl + "\" class=\"link\">点击访问内网服务</a>" +
                "<script>setTimeout(function() { window.location.href = \"" + redirectUrl + "\"; }, 1000);</" + "script>";
        } else {
            document.getElementById("content").innerHTML =
                "<h1 class=\"error\">❌ " + message + "</h1>" +
                "<p>请检查Token是否正确，或联系内网服务管理员</p>" +
                "<a href=\"/\" class=\"back-link\">返回首页</a>";
        }
    </script>
</body>
</html>
